<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes club</title>
    
    <link rel="apple-touch-icon" href="https://icons8.com">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #010101, #030304, #060608, #020202);
            background-size: 400% 400%;
            animation: obsidianGradient 40s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        @keyframes obsidianGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ЭКРАН ВХОДА */
        .auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 24px; transition: opacity 0.5s ease;
        }
        .auth-box {
            width: 100%; max-width: 320px;
            background: rgba(15, 15, 18, 0.6); backdrop-filter: blur(30px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.02);
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9);
        }
        .auth-box h2 { color: #fff; font-size: 24px; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        .auth-box p { color: rgba(255, 255, 255, 0.2); font-size: 13px; margin-bottom: 24px; }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ */
        .glass-container {
            width: 100%; max-width: 380px; height: 85vh; max-height: 720px;
            background: rgba(10, 10, 12, 0.45); backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 24px; display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255,255,255,0.01);
            margin: 16px; position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: #ffffff; font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.015); padding: 3px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.01); }
        .tab-btn {
            padding: 8px 14px; background: none; border: none;
            color: rgba(255,255,255,0.3); font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 9px; transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255,255,255,0.06); color: #ffffff; }

        /* ТУЛБАР ЛЕНТЫ */
        .sub-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .sub-tab-btn {
            flex: 1; padding: 10px; background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.02); border-radius: 12px;
            color: rgba(255,255,255,0.35); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; text-align: center;
        }
        .sub-tab-btn.active { background: rgba(255,255,255,0.05); color: #fff; border-color: rgba(255,255,255,0.08); }

        /* ИНПУТЫ */
        .glass-input {
            width: 100%; padding: 15px 16px; background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.025); border-radius: 14px;
            color: #ffffff; font-size: 15px; outline: none; transition: all 0.25s ease; margin-bottom: 12px;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.15); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.02); border-color: rgba(255,255,255,0.08); }
        .textarea-input { flex: 1; min-height: 160px; resize: none; margin-bottom: 16px; }

        /* СЕЛЕКТОР ПРИВАТНОСТИ */
        .privacy-selector { display: flex; gap: 8px; margin-bottom: 16px; }
        .privacy-btn {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.01);
            border: 1px solid rgba(255,255,255,0.025); border-radius: 12px;
            color: rgba(255,255,255,0.25); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .privacy-btn.active { background: rgba(255, 255, 255, 0.05); color: #ffffff; border-color: rgba(255,255,255,0.08); }

        /* БЕЛАЯ КНОПКА APPLE */
        .main-btn {
            width: 100%; padding: 16px; background: #ffffff; border: none;
            border-radius: 14px; color: #000000; font-size: 15px; font-weight: 700;
            letter-spacing: -0.2px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* СИСТЕМА ОКОН */
        .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
        .screen.active { display: flex; }
        .notes-list { flex: 1; overflow-y: auto; padding-right: 2px; scroll-behavior: smooth; }
        .notes-list::-webkit-scrollbar { width: 0px; }

        /* КАРТОЧКА МЫСЛИ */
        .note-item {
            background: rgba(255, 255, 255, 0.008) !important; border: 1px solid rgba(255, 255, 255, 0.015) !important;
            padding: 16px; border-radius: 16px; color: #ffffff; margin-bottom: 12px;
            position: relative; animation: appleSpawn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.2s ease; cursor: pointer; display: block;
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.015) !important; border-color: rgba(255,255,255,0.04) !important; }
        @keyframes appleSpawn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .note-title { font-weight: 600; font-size: 15.5px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; color: #ffffff; }
        .note-desc { font-size: 13.5px; color: rgba(255, 255, 255, 0.4); word-break: break-word; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .note-meta { font-size: 10px; color: rgba(255,255,255,0.12); margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
        .note-author { font-weight: 600; color: rgba(255, 255, 255, 0.3); text-transform: lowercase; }

        .action-del { cursor: pointer; color: rgba(255,255,255,0.12); font-size: 11px; background: none; border: none; outline: none; padding: 4px; }
        .action-del:hover { color: #ff453a; }

        /* ПОЛНОЭКРАННЫЙ ПРОСМОТР */
        .viewer-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #040405; border-radius: 28px; padding: 24px;
            display: none; flex-direction: column; z-index: 500; animation: modalFade 0.25s ease;
        }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .viewer-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.4; }
        .viewer-close:hover { opacity: 1; }
        .viewer-title { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .viewer-author { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 20px; font-weight: 600; text-transform: lowercase; }
        .viewer-body { color: rgba(255,255,255,0.65); font-size: 15px; line-height: 1.6; overflow-y: auto; flex: 1; word-break: break-word; }
        .viewer-body::-webkit-scrollbar { width: 0px; }
        
        /* ТЕКСТ ТЕКУЩЕГО ТРЕКА */
        .track-info { font-size: 9px; color: rgba(255,255,255,0.15); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>

    <!-- ОКНО РЕГИСТРАЦИИ -->
    <div class="auth-screen" id="auth-screen">
        <div class="auth-box">
            <h2>Notes club</h2>
            <p>Вход в пространство мыслей</p>
            <input type="text" id="auth-username" class="glass-input" placeholder="Ваше имя...">
            <input type="password" id="auth-password" class="glass-input" placeholder="Пароль...">
            <button class="main-btn" onclick="handleLogin()">Создать себя</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ МОДУЛЬ -->
    <div class="glass-container">
        <div class="viewer-modal" id="viewer-modal">
            <div class="viewer-header">
                <div class="viewer-author" id="v-author">автор: @user</div>
                <button class="viewer-close" onclick="closeNoteViewer()">✕</button>
            </div>
            <div class="viewer-title" id="v-title">Название мысли</div>
            <div class="viewer-body" id="v-body">Полный текст...</div>
        </div>

        <div class="top-bar">
            <div>
                <div class="logo">Notes club</div>
                <div class="track-info" id="track-display">Audio: Off</div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tab-write" onclick="switchScreen('write')">Писать</button>
                <button class="tab-btn" id="tab-list" onclick="switchScreen('list')">Лента</button>
            </div>
        </div>

        <div id="screen-write" class="screen active">
            <input type="text" id="note-heading" class="glass-input" placeholder="Название мысли...">
            <textarea id="note-text" class="glass-input textarea-input" placeholder="Начните писать здесь..."></textarea>
            
            <div class="privacy-selector">
                <button class="privacy-btn active" id="p-btn-private" onclick="setPrivacy(false)">Личная</button>
                <button class="privacy-btn" id="p-btn-public" onclick="setPrivacy(true)">Публичная</button>
            </div>
            
            <button class="main-btn" onclick="publishNote()">Поделиться мыслью</button>
        </div>

        <div id="screen-list" class="screen">
            <div class="sub-bar">
                <button class="sub-tab-btn active" id="sub-tab-my" onclick="setFeedChannel('my')">Мои заметки</button>
                <button class="sub-tab-btn" id="sub-tab-feed" onclick="setFeedChannel('feed')">Рекомендации</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" class="glass-input search-input" placeholder="Поиск по названию..." oninput="liveSearch()">
            </div>
            
            <div id="notes-container" class="notes-list"></div>
        </div>
    </div>

    <!-- АЛГОРИТМИЧЕСКИЙ ЖИВОЙ ЗВУКОВОЙ ДВИЖОК -->
    <script>
        let audioCtx = null;
        let isMusicRunning = false;
        let currentUser = localStorage.getItem('notes_club_user_v4') || "";
        
        let isPublicNote = false;
        let currentFeedChannel = "my";
        let database = [];

        // 1. ПРИНУДИТЕЛЬНОЕ ОЧИЩЕНИЕ ВСЕХ СТАРЫХ ЗАПИСЕЙ СЕЙЧАС (И личных, и публичных)
        localStorage.removeItem('notes_club_db');
        localStorage.removeItem('notes_club_db_v2');
        localStorage.removeItem('notes_club_db_v3');
        localStorage.setItem('notes_club_db_v4', JSON.stringify([]));

        // Проверка сессии входа
        if (currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
        }

        function handleLogin() {
            const user = document.getElementById('auth-username').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            if (!user || !pass) return;
            
            currentUser = user;
            localStorage.setItem('notes_club_user_v4', user);
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('auth-screen').style.display = 'none'; }, 500);
            
            startGenerativeEngine();
        }

        // 2. ВЫСОКОТЕХНОЛОГИЧНЫЙ АЛГОРИТМИЧЕСКИЙ СИНТЕЗАТОР ЭМБИЕНТА
        let trackId = 1;
        let trackInterval = null;
        let layersInterval = null;
        let masterGain = null;
        let masterFilter = null;
        let delayNode = null;

        // Наборы ностальгических лоу-фай тональностей (смена каждые 2 минуты)
        const scalePresets = [
            { name: "Track Alpha: Solitude", root: 55.00, chord: [1, 1.2, 1.5, 1.8], melody: [220, 261.63, 329.63, 392.00] },
            { name: "Track Beta: Nostalgia", root: 65.41, chord: [1, 1.25, 1.33, 1.5], melody: [261.63, 311.13, 349.23, 415.30] },
            { name: "Track Gamma: Snowfall", root: 48.99, chord: [1, 1.18, 1.4, 1.6], melody: [196.00, 246.94, 293.66, 369.99] }
        ];
        let activeScale = scalePresets[0];

        function startGenerativeEngine() {
            if (isMusicRunning) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Мастер-секция эффектов
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.28, audioCtx.currentTime); // Плотный высокий уровень звука
            
            masterFilter = audioCtx.createBiquadFilter();
            masterFilter.type = 'lowpass';
            masterFilter.frequency.setValueAtTime(240, audioCtx.currentTime); // Глубокий матовый лоу-пасс срез
            
            delayNode = audioCtx.createDelay(3.0);
            delayNode.delayTime.setValueAtTime(0.75, audioCtx.currentTime);
            
            let delayFeedback = audioCtx.createGain();
            delayFeedback.gain.setValueAtTime(0.55, audioCtx.currentTime); // Объемное эхо-зацикливание

            masterGain.connect(masterFilter);
            masterFilter.connect(audioCtx.destination);
            
            masterFilter.connect(delayNode);
            delayNode.connect(delayFeedback);
            delayFeedback.connect(masterFilter);

            // Полноценный генератор текстурного аналогового кассетного шума
            function initTapeNoise() {
                let bufferSize = 2 * audioCtx.sampleRate,
                    buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                    data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                let source = audioCtx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;

                let noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.setValueAtTime(420, audioCtx.currentTime);

                let noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.015, audioCtx.currentTime); // Теплый хруст ленты

                source.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                source.start();
            }
            initTapeNoise();

            // Функция динамической перестройки слоев (Каждые 40 секунд)
            function mutateAudioLayers() {
                const now = audioCtx.currentTime;
                document.getElementById('track-display').innerText = `${activeScale.name} · Evolution`;

                // Синтез глубоких фоновых подкладов (Pads)
                activeScale.chord.forEach((multiplier, index) => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    
                    osc.type = 'triangle'; // Лоу-фай мягкий тон
                    let flutter = (Math.random() * 2 - 1) * 0.4;
                    osc.frequency.setValueAtTime((activeScale.root * multiplier) + flutter, now);
                    
                    // Плавное дыхание звука: атака 3 секунды, удержание, медленный релиз
                    gain.gain.setValueAtTime(0, now);
                    gain.gain.linearRampToValueAtTime(0.2, now + 3.0);
                    gain.gain.exponentialRampToValueAtTime(0.0001, now + 38.0);
                    
                    osc.connect(gain);
                    gain.connect(masterGain);
                    osc.start(now);
                    osc.stop(now + 39.0);
                });

                // Генерация случайных капель меланхоличной мелодии на верхнем плане
                for (let i = 0; i < 6; i++) {
                    let timeOffset = i * (4 + Math.random() * 2);
                    let randomFreq = activeScale.melody[Math.floor(Math.random() * activeScale.melody.length)];
                    
                    let sineOsc = audioCtx.createOscillator();
                    let sineGain = audioCtx.createGain();
                    
                    sineOsc.type = 'sine';
                    sineOsc.frequency.setValueAtTime(randomFreq, now + timeOffset);
                    
                    sineGain.gain.setValueAtTime(0, now + timeOffset);
                    sineGain.gain.linearRampToValueAtTime(0.08, now + timeOffset + 0.8);
                    sineGain.gain.exponentialRampToValueAtTime(0.0001, now + timeOffset + 3.5);
                    
                    sineOsc.connect(sineGain);
                    sineGain.connect(masterGain);
                    sineOsc.start(now + timeOffset);
                    sineOsc.stop(now + timeOffset + 4.0);
                }

                // Случайная фоновая тишина (Микро-затухание фильтра на слое)
                let filterTarget = 180 + (Math.random() * 140);
                masterFilter.frequency.setTargetAtTime(filterTarget, now, 4);
            }

            // Функция полной смены музыкального трека (Каждые 2 минуты)
            function cycleFullTrack() {
                trackId = (trackId + 1) % scalePresets.length;
                activeScale = scalePresets[trackId];
                // Мгновенно вызываем перестройку слоев под новую тональность
                mutateAudioLayers();
            }

            mutateAudioLayers();
            layersInterval = setInterval(mutateAudioLayers, 40000); // Эволюция каждые 40 сек
            trackInterval = setInterval(cycleFullTrack, 120000);    // Смена трека каждые 2 мин
            
            isMusicRunning = true;
        }

        document.body.addEventListener('click', startGenerativeEngine, { once: true });
        document.body.addEventListener('touchstart', startGenerativeEngine, { once: true });

        // Навигация
        function switchScreen(type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            if (type === 'write') {
                document.getElementById('screen-write').classList.add('active');
                document.getElementById('tab-write').classList.add('active');
            } else {
                document.getElementById('screen-list').classList.add('active');
                document.getElementById('tab-list').classList.add('active');
                renderNotesList();
            }
        }

        function setPrivacy(isPublic) {
            isPublicNote = isPublic;
            document.getElementById('p-btn-private').classList.toggle('active', !isPublic);
            document.getElementById('p-btn-public').classList.toggle('active', isPublic);
        }

        function setFeedChannel(channel) {
            currentFeedChannel = channel;
            document.getElementById('sub-tab-my').classList.toggle('active', channel === 'my');
            document.getElementById('sub-tab-feed').classList.toggle('active', channel === 'feed');
            renderNotesList();
        }

        // Публикация
        function publishNote() {
            const hField = document.getElementById('note-heading');
            const bField = document.getElementById('note-text');
            
            if (bField.value.trim() === "") return;
            
            let heading = hField.value.trim();
            if (!heading) heading = `Мысль #${database.length + 1}`;
            
            const timeStamp = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) + ' · ' + new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});

            const newNote = {
                id: Date.now(),
                title: heading,
                body: bField.value.trim(),
                author: currentUser || "аноним",
                privacy: isPublicNote ? "public" : "private",
                time: timeStamp
            };

            let currentDb = JSON.parse(localStorage.getItem('notes_club_db_v4')) || [];
            currentDb.unshift(newNote);
            database = currentDb;
            localStorage.setItem('notes_club_db_v4', JSON.stringify(database));
            
            hField.value = "";
            bField.value = "";
            
            setFeedChannel('my');
            switchScreen('list');
        }

        // Вывод элементов
        function renderNotesList(filterQuery = "") {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";

            database.forEach((note) => {
                if (filterQuery && !note.title.toLowerCase().includes(filterQuery.toLowerCase())) return;

                if (currentFeedChannel === 'my') {
                    if (note.author !== currentUser) return;
                } else {
                    if (note.privacy !== 'public') return;
                }

                const card = document.createElement('div');
                card.classList.add('note-item');
                
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('action-del')) return;
                    openNoteViewer(note);
                });
                
                const deleteBtn = note.author === currentUser ? `<button class="action-del" onclick="deleteNote(${note.id}, event)">✕</button>` : '';

                card.innerHTML = `
                    <div class="note-title">
                        <span>${note.title}</span>
                        ${deleteBtn}
                    </div>
                    <div class="note-desc">${note.body}</div>
                    <div class="note-meta">
                        <span class="note-author">@${note.author} ${note.privacy === 'private' ? '🔒' : '🌍'}</span>
                        <span>${note.time}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function liveSearch() {
            renderNotesList(document.getElementById('search-input').value);
        }

        function deleteNote(id, event) {
            event.stopPropagation();
            let currentDb = JSON.parse(localStorage.getItem('notes_club_db_v4')) || [];
            currentDb = currentDb.filter(note => note.id !== id);
            database = currentDb;
            localStorage.setItem('notes_club_db_v4', JSON.stringify(database));
            renderNotesList(document.getElementById('search-input').value);
        }

        function openNoteViewer(note) {
            document.getElementById('v-author').innerText = `автор: @${note.author}`;
            document.getElementById('v-title').innerText = note.title;
            document.getElementById('v-body').innerText = note.body;
            document.getElementById('viewer-modal').style.display = 'flex';
        }

        function closeNoteViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
        }

        // Стартовая прорисовка (база пустая)
        database = JSON.parse(localStorage.getItem('notes_club_db_v4')) || [];
        renderNotesList();
    </script>

</body>
</html>
