<html lang="ru">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIk5vdGVzIGNsdWIiLAogICJzaG9ydF9uYW1lIjogIk5vdGVzIGNsdWIiLAogICJzdGFydF91cmwiOiAiLiIsCiAgImRpc3BsYXkiOiAic3RhbmGFbG9uZSIsCiAgImJhY2tncm91bmRfY29sb3IiOiAiIzAwMDAwMCIsCiAgInRoZW1lX2NvbG9yIjogIiMwMDAwMDAiLAogICJpY29ucyI6IFsKICAgIHsKICAgICAgInNyYyI6ICJodHRwczovL2ltZy5pY29uczguY29tL2lvcy1maWxsZWQvNTAwL2ZmZmZmZi9tYWNib29rLWlkZWEucG5nIiwKICAgICAgInNpemVzIjogIjUwMHg1MDAiLAogICAgICAidHlwZSI6ICJpbWFnZS9wbmciCiAgICB9CiAgXQp9">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
        
        /* УГОЛЬНЫЙ ОБСИДИАН */
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #010101, #050506, #09090b, #030304);
            background-size: 400% 400%;
            animation: obsidianGradient 40s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes obsidianGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* КОНТЕЙНЕР APPLE FROSTED GLASS */
        .glass-container {
            width: 100%;
            max-width: 380px;
            height: 85vh;
            max-height: 720px;
            background: rgba(12, 12, 14, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255,255,255,0.01);
            margin: 16px;
        }

        /* ТОП ПАНЕЛЬ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 26px; }
        .logo { color: #ffffff; font-size: 21px; font-weight: 700; letter-spacing: -0.5px; opacity: 0.95; }
        
        /* ВКЛАДКИ */
        .tabs { display: flex; background: rgba(255,255,255,0.02); padding: 3px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.01); }
        .tab-btn {
            padding: 8px 14px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.35);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255,255,255,0.07); color: #ffffff; }

        /* ИНПУТЫ ТЕКСТА */
        .glass-input {
            width: 100%;
            padding: 15px 16px;
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            margin-bottom: 12px;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.18); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.03); border-color: rgba(255,255,255,0.1); }

        .textarea-input { flex: 1; min-height: 200px; resize: none; margin-bottom: 20px; }

        /* СТИЛЬНАЯ БЕЛАЯ КНОПКА APPLE */
        .main-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* ОКОННЫЕ СИСТЕМЫ */
        .screen { display: none; flex-direction: column; flex: 1; }
        .screen.active { display: flex; }

        /* ПОИСК ТЕЛЕГРАМ */
        .search-container { position: relative; margin-bottom: 16px; }
        .search-input { margin-bottom: 0; padding-left: 16px; background: rgba(255,255,255,0.02); }

        /* ЛЕНТА КАРТОЧЕК */
        .notes-list { flex: 1; overflow-y: auto; padding-right: 2px; scroll-behavior: smooth; }
        .notes-list::-webkit-scrollbar { width: 0px; }

        .note-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.02);
            padding: 16px;
            border-radius: 16px;
            color: #ffffff;
            margin-bottom: 12px;
            position: relative;
            animation: appleSpawn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.2s ease;
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.015); border-color: rgba(255,255,255,0.04); }

        @keyframes appleSpawn { 
            from { opacity: 0; transform: translateY(8px); filter: blur(2px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .note-title { font-weight: 600; font-size: 15.5px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.2px; }
        .note-desc { font-size: 13.5px; color: rgba(255, 255, 255, 0.45); word-break: break-word; line-height: 1.45; }
        .note-meta { font-size: 10px; color: rgba(255,255,255,0.15); margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }

        .action-del { cursor: pointer; color: rgba(255,255,255,0.15); font-size: 11px; background: none; border: none; outline: none; transition: color 0.2s; }
        .action-del:hover { color: #ff453a; }
    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Шапка -->
        <div class="top-bar">
            <div class="logo">Notes club</div>
            <div class="tabs">
                <button class="tab-btn active" id="tab-write" onclick="switchScreen('write')">Писать</button>
                <button class="tab-btn" id="tab-list" onclick="switchScreen('list')">Лента</button>
            </div>
        </div>

        <!-- ОКНО 1: НАПИСАТЬ ТЕКСТ -->
        <div id="screen-write" class="screen active">
            <input type="text" id="note-heading" class="glass-input" placeholder="Название мысли...">
            <textarea id="note-text" class="glass-input textarea-input" placeholder="Начните писать здесь..."></textarea>
            <button class="main-btn" onclick="publishNote()">Поделиться мыслью</button>
        </div>

        <!-- ОКНО 2: ЛЕНТА МЫСЛЕЙ И ПОИСК -->
        <div id="screen-list" class="screen">
            <div class="search-container">
                <input type="text" id="search-input" class="glass-input search-input" placeholder="Поиск по названию..." oninput="liveSearch()">
            </div>
            <div id="notes-container" class="notes-list"></div>
        </div>
    </div>

    <!-- УЛЬТРАБЫСТРЫЙ ДВИЖОК JS + ПРОЦЕДУРНЫЙ СИНТЕЗАТОР ONEHEART NOSTALGIA -->
    <script>
        let audioCtx = null;
        let isMusicRunning = false;
        let database = JSON.parse(localStorage.getItem('notes_club_db')) || [];

        // ВЫСОКОТЕХНОЛОГИЧНЫЙ СИНТЕЗАТОР НОСТАЛЬГИЧЕСКОГО ЛОУ-ФАЙ ЭМБИЕНТА
        function startOneheartAmbient() {
            if (isMusicRunning) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // 1. Мастер-фильтр низких частот (Лоу-пасс для глухого глубокого звука)
            let masterFilter = audioCtx.createBiquadFilter();
            masterFilter.type = 'lowpass';
            masterFilter.frequency.setValueAtTime(320, audioCtx.currentTime); // Срезаем все резкие частоты
            masterFilter.connect(audioCtx.destination);

            // 2. Узел пространственного эхо (Delay)
            let delayNode = audioCtx.createDelay(3.0);
            delayNode.delayTime.setValueAtTime(0.8, audioCtx.currentTime);
            
            let delayGain = audioCtx.createGain();
            delayGain.gain.setValueAtTime(0.45, audioCtx.currentTime); // Долгие гулкие хвосты реверберации
            
            masterFilter.connect(delayNode);
            delayNode.connect(delayGain);
            delayGain.connect(masterFilter); // Зацикливаем эхо

            // 3. ГЕНЕРАТОР ВИНИЛОВОГО ШУМА И АНАЛОГОВОГО ТЕПЛА КОДОМ
            function createVinylNoise() {
                let bufferSize = 2 * audioCtx.sampleRate,
                    noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                    output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) {
                    output[i] = Math.random() * 2 - 1;
                }
                let whiteNoise = audioCtx.createBufferSource();
                whiteNoise.buffer = noiseBuffer;
                whiteNoise.loop = true;

                let noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.setValueAtTime(600, audioCtx.currentTime);
                noiseFilter.Q.setValueAtTime(1.0, audioCtx.currentTime);

                let noiseGain = audioCtx.createGain();
                noiseGain.gain.setValueAtTime(0.015, audioCtx.currentTime); // Тонкий, едва заметный шум

                whiteNoise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(audioCtx.destination);
                whiteNoise.start();
            }
            createVinylNoise();

            // Ностальгические минорные аккорды (Палитра Oneheart - "Snowfall" стиль)
            const nostalgiaChords = [
                [55.00, 110.00, 146.83, 164.81], // Asiz/Am Глубокая меланхолия
                [65.41, 130.81, 174.61, 196.00], // Fmaj7 Воздушная грусть
                [48.99, 97.99, 130.81, 146.83]   // Cmaj Саунд-дизайн одиночества
            ];

            function spawnLoFiPad() {
                const currentChord = nostalgiaChords[Math.floor(Math.random() * nostalgiaChords.length)];
                
                currentChord.forEach((freq, idx) => {
                    // Используем треугольную волну (triangle) для мягкого аналогового тона пэдов
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    
                    // ЭФФЕКТ ДЕТЮНИНГА (Микро-плавание частоты для эффекта старой кассеты)
                    let tapeFlutter = (Math.random() * 2 - 1) * 0.4;
                    osc.frequency.setValueAtTime(freq + tapeFlutter, audioCtx.currentTime);
                    
                    // Плавная атака и долгое затухание звуковой волны (ГРОМКОСТЬ ВЫКРУЧЕНА НА 0.16)
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.16, audioCtx.currentTime + 2.0); // Нарастание пэда
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 5.5); // Медленный уход в эхо
                    
                    osc.connect(gainNode);
                    gainNode.connect(masterFilter);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 5.6);
                });
            }

            spawnLoFiPad();
            setInterval(spawnLoFiPad, 5000); // Смена волн каждые 5 секунд
            
            isMusicRunning = true;
        }

        // Авто-включение музыки без кнопок при первом же тапе по экрану
        document.body.addEventListener('click', startOneheartAmbient, { once: true });
        document.body.addEventListener('touchstart', startOneheartAmbient, { once: true });

        // Навигация окон
        function switchScreen(screenType) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            if (screenType === 'write') {
                document.getElementById('screen-write').classList.add('active');
                document.getElementById('tab-write').classList.add('active');
            } else {
                document.getElementById('screen-list').classList.add('active');
                document.getElementById('tab-list').classList.add('active');
                renderNotesList();
            }
        }

        // Публикация заметок
        function publishNote() {
            const hField = document.getElementById('note-heading');
            const bField = document.getElementById('note-text');
            
            if (bField.value.trim() === "") return;
            
            let heading = hField.value.trim();
            if (!heading) heading = `Мысль #${database.length + 1}`;
            
            const timeStamp = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) + ' · ' + new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});

            const newNote = {
                title: heading,
                body: bField.value.trim(),
                time: timeStamp
            };

            database.unshift(newNote);
            localStorage.setItem('notes_club_db', JSON.stringify(database));
            
            hField.value = "";
            bField.value = "";
            
            switchScreen('list');
        }

        // Вывод ленты мыслей
        function renderNotesList(filterQuery = "") {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";

            database.forEach((note, index) => {
                // Живой поиск по названию
                if (filterQuery && !note.title.toLowerCase().includes(filterQuery.toLowerCase())) {
                    return; 
                }

                const card = document.createElement('div');
                card.classList.add('note-item');
                card.innerHTML = `
                    <div class="note-title">
                        <span>${note.title}</span>
                        <button class="action-del" onclick="deleteNote(${index}, event)">✕</button>
                    </div>
                    <div class="note-desc">${note.body}</div>
                    <div class="note-meta">
                        <span>${note.time}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function liveSearch() {
            const query = document.getElementById('search-input').value;
            renderNotesList(query);
        }

        function deleteNote(index, event) {
            event.stopPropagation();
            database.splice(index, 1);
            localStorage.setItem('notes_club_db', JSON.stringify(database));
            renderNotesList(document.getElementById('search-input').value);
        }

        renderNotesList();
    </script>

</body>
</html>
