<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes club</title>
    
    <link rel="apple-touch-icon" href="https://icons8.com">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; }
        
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #010101, #040405, #08080a, #020203);
            background-size: 400% 400%;
            animation: obsidianGradient 40s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        @keyframes obsidianGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* ЭКРАН ВХОДА */
        .auth-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000000; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 24px; transition: opacity 0.5s ease;
        }
        .auth-box {
            width: 100%; max-width: 320px;
            background: rgba(20, 20, 25, 0.6); backdrop-filter: blur(30px);
            padding: 30px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.03);
            text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        .auth-box h2 { color: #fff; font-size: 24px; margin-bottom: 8px; font-weight: 700; letter-spacing: -0.5px; }
        .auth-box p { color: rgba(255, 255, 255, 0.25); font-size: 13px; margin-bottom: 24px; }

        /* ГЛАВНЫЙ КОНТЕЙНЕР ПРИЛОЖЕНИЯ */
        .glass-container {
            width: 100%; max-width: 380px; height: 85vh; max-height: 720px;
            background: rgba(12, 12, 14, 0.4); backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 28px; border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 24px; display: flex; flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255,255,255,0.01);
            margin: 16px; position: relative;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .logo { color: #ffffff; font-size: 21px; font-weight: 700; letter-spacing: -0.5px; }
        
        .tabs { display: flex; background: rgba(255,255,255,0.02); padding: 3px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.01); }
        .tab-btn {
            padding: 8px 14px; background: none; border: none;
            color: rgba(255,255,255,0.35); font-size: 13px; font-weight: 600;
            cursor: pointer; border-radius: 9px; transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255,255,255,0.07); color: #ffffff; }

        /* ТУЛБАР ЛЕНТЫ (Мои заметки / Рекомендации) */
        .sub-bar { display: flex; gap: 8px; margin-bottom: 16px; }
        .sub-tab-btn {
            flex: 1; padding: 10px; background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03); border-radius: 12px;
            color: rgba(255,255,255,0.4); font-size: 12px; font-weight: 600;
            cursor: pointer; transition: all 0.2s ease; text-align: center;
        }
        .sub-tab-btn.active { background: rgba(255,255,255,0.06); color: #fff; border-color: rgba(255,255,255,0.1); }

        /* ИНПУТЫ */
        .glass-input {
            width: 100%; padding: 15px 16px; background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255, 255, 255, 0.03); border-radius: 14px;
            color: #ffffff; font-size: 15px; outline: none; transition: all 0.25s ease; margin-bottom: 12px;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.18); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.03); border-color: rgba(255,255,255,0.1); }
        .textarea-input { flex: 1; min-height: 160px; resize: none; margin-bottom: 16px; }

        /* СЕЛЕКТОР ПРИВАТНОСТИ */
        .privacy-selector { display: flex; gap: 8px; margin-bottom: 16px; }
        .privacy-btn {
            flex: 1; padding: 12px; background: rgba(255,255,255,0.015);
            border: 1px solid rgba(255,255,255,0.03); border-radius: 12px;
            color: rgba(255,255,255,0.3); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .privacy-btn.active { background: rgba(255, 255, 255, 0.06); color: #ffffff; border-color: rgba(255,255,255,0.1); }

        /* БЕЛАЯ КНОПКА APPLE */
        .main-btn {
            width: 100%; padding: 16px; background: #ffffff; border: none;
            border-radius: 14px; color: #000000; font-size: 15px; font-weight: 700;
            letter-spacing: -0.2px; cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* СИСТЕМА ОКОН */
        .screen { display: none; flex-direction: column; flex: 1; min-height: 0; }
        .screen.active { display: flex; }
        .notes-list { flex: 1; overflow-y: auto; padding-right: 2px; scroll-behavior: smooth; }
        .notes-list::-webkit-scrollbar { width: 0px; }

        /* КАРТОЧКА МЫСЛИ */
        .note-item {
            background: rgba(255, 255, 255, 0.01) !important; border: 1px solid rgba(255, 255, 255, 0.02) !important;
            padding: 16px; border-radius: 16px; color: #ffffff; margin-bottom: 12px;
            position: relative; animation: appleSpawn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.2s ease; cursor: pointer; display: block; text-decoration: none;
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.02) !important; border-color: rgba(255,255,255,0.05) !important; }
        @keyframes appleSpawn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

        .note-title { font-weight: 600; font-size: 15.5px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; color: #ffffff; }
        .note-desc { font-size: 13.5px; color: rgba(255, 255, 255, 0.45); word-break: break-word; line-height: 1.45; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .note-meta { font-size: 10px; color: rgba(255,255,255,0.15); margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
        .note-author { font-weight: 600; color: rgba(255, 255, 255, 0.35); text-transform: lowercase; }

        .action-del { cursor: pointer; color: rgba(255,255,255,0.15); font-size: 11px; background: none; border: none; outline: none; padding: 4px; position: relative; z-index: 10; }
        .action-del:hover { color: #ff453a; }

        /* ПОЛНОЭКРАННЫЙ ПРОСМОТР ЗАМЕТКИ */
        .viewer-modal {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #050506; border-radius: 28px; padding: 24px;
            display: none; flex-direction: column; z-index: 500; animation: modalFade 0.25s ease;
        }
        @keyframes modalFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .viewer-close { background: none; border: none; color: #fff; font-size: 20px; cursor: pointer; opacity: 0.5; transition: opacity 0.2s; }
        .viewer-close:hover { opacity: 1; }
        .viewer-title { color: #fff; font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: -0.5px; }
        .viewer-author { font-size: 12px; color: rgba(255,255,255,0.35); margin-bottom: 20px; font-weight: 600; text-transform: lowercase; }
        .viewer-body { color: rgba(255,255,255,0.7); font-size: 15px; line-height: 1.6; overflow-y: auto; flex: 1; word-break: break-word; padding-right: 4px; }
        .viewer-body::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <!-- ОКНО РЕГИСТРАЦИИ -->
    <div class="auth-screen" id="auth-screen">
        <div class="auth-box">
            <h2>Notes club</h2>
            <p>Вход в пространство мыслей</p>
            <input type="text" id="auth-username" class="glass-input" placeholder="Ваше имя...">
            <input type="password" id="auth-password" class="glass-input" placeholder="Пароль...">
            <button class="main-btn" onclick="handleLogin()">Создать себя</button>
        </div>
    </div>

    <!-- ОСНОВНОЙ МОДУЛЬ -->
    <div class="glass-container">
        <!-- Полноэкранный просмотр карточки -->
        <div class="viewer-modal" id="viewer-modal">
            <div class="viewer-header">
                <div class="viewer-author" id="v-author">автор: @user</div>
                <button class="viewer-close" onclick="closeNoteViewer()">✕</button>
            </div>
            <div class="viewer-title" id="v-title">Название мысли</div>
            <div class="viewer-body" id="v-body">Полный текст...</div>
        </div>

        <!-- Шапка -->
        <div class="top-bar">
            <div class="logo">Notes club</div>
            <div class="tabs">
                <button class="tab-btn active" id="tab-write" onclick="switchScreen('write')">Писать</button>
                <button class="tab-btn" id="tab-list" onclick="switchScreen('list')">Лента</button>
            </div>
        </div>

        <!-- ОКНО 1: ПИСАТЬ -->
        <div id="screen-write" class="screen active">
            <input type="text" id="note-heading" class="glass-input" placeholder="Название мысли...">
            <textarea id="note-text" class="glass-input textarea-input" placeholder="Начните писать здесь..."></textarea>
            
            <div class="privacy-selector">
                <button class="privacy-btn active" id="p-btn-private" onclick="setPrivacy(false)">Личная</button>
                <button class="privacy-btn" id="p-btn-public" onclick="setPrivacy(true)">Публичная</button>
            </div>
            
            <button class="main-btn" onclick="publishNote()">Поделиться мыслью</button>
        </div>

        <!-- ОКНО 2: ЛЕНТА -->
        <div id="screen-list" class="screen">
            <div class="sub-bar">
                <button class="sub-tab-btn active" id="sub-tab-my" onclick="setFeedChannel('my')">Мои заметки</button>
                <button class="sub-tab-btn" id="sub-tab-feed" onclick="setFeedChannel('feed')">Рекомендации</button>
            </div>
            
            <div class="search-container">
                <input type="text" id="search-input" class="glass-input search-input" placeholder="Поиск по названию..." oninput="liveSearch()">
            </div>
            
            <div id="notes-container" class="notes-list"></div>
        </div>
    </div>

    <script>
        let audioCtx = null;
        let isMusicRunning = false;
        let currentUser = localStorage.getItem('notes_club_user_v3') || "";
        
        let isPublicNote = false;
        let currentFeedChannel = "my";

        // Системная база данных (Полноценное чтение кэша)
        let database = JSON.parse(localStorage.getItem('notes_club_db_v3'));
        if (!database || !Array.isArray(database)) {
            database = [
                { id: 1, title: "Эстетика осени", body: "Капли дождя бьют по стеклу окон кофейни, растворяясь в неоновом свете вечернего города. В такие моменты хочется просто молчать.", author: "Arseny", privacy: "public", time: "18:24 · 19.05" },
                { id: 2, title: "Звуки тишины", body: "Эмбиент-музыка Oneheart помогает сфокусироваться на внутреннем мире. Ностальгия — это не грусть, это память о прекрасном.", author: "Sofia_Ambient", privacy: "public", time: "12:05 · 18.05" },
                { id: 3, title: "Утренний Токио", body: "Пустые улицы, туман над линиями метро и едва заметный розоватый рассвет. Город еще спит, сохраняя свои тайны.", author: "Neon_Dreamer", privacy: "public", time: "05:11 · 15.05" }
            ];
            localStorage.setItem('notes_club_db_v3', JSON.stringify(database));
        }

        // Проверка сессии (Запоминание пользователя навсегда)
        if (currentUser) {
            document.getElementById('auth-screen').style.display = 'none';
        }

        function handleLogin() {
            const user = document.getElementById('auth-username').value.trim();
            const pass = document.getElementById('auth-password').value.trim();
            if (!user || !pass) return;
            
            currentUser = user;
            localStorage.setItem('notes_club_user_v3', user); // Сохраняем имя автора навсегда
            document.getElementById('auth-screen').style.opacity = '0';
            setTimeout(() => { document.getElementById('auth-screen').style.display = 'none'; }, 500);
            
            startOneheartAmbient();
        }

        // ГЛУБОКИЙ ГЕНЕРАТИВНЫЙ СИНТЕЗАТОР ONEHEART
        function startOneheartAmbient() {
            if (isMusicRunning) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let masterFilter = audioCtx.createBiquadFilter();
            masterFilter.type = 'lowpass';
            masterFilter.frequency.setValueAtTime(250, audioCtx.currentTime); // Очень глухой, бархатный лоу-пасс
            masterFilter.connect(audioCtx.destination);

            let delayNode = audioCtx.createDelay(3.0);
            delayNode.delayTime.setValueAtTime(0.8, audioCtx.currentTime);
            
            let delayGain = audioCtx.createGain();
            delayGain.gain.setValueAtTime(0.55, audioCtx.currentTime); // Хвосты пространственного эхо
            
            masterFilter.connect(delayNode);
            delayNode.connect(delayGain);
            delayGain.connect(masterFilter);

            // Текстура шума и тепла ленты
            function initTapeHiss() {
                let bufferSize = 2 * audioCtx.sampleRate,
                    noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                    output = noiseBuffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { output[i] = Math.random() * 2 - 1; }
                let hissSource = audioCtx.createBufferSource();
                hissSource.buffer = noiseBuffer;
                hissSource.loop = true;

                let hissFilter = audioCtx.createBiquadFilter();
                hissFilter.type = 'bandpass';
                hissFilter.frequency.setValueAtTime(450, audioCtx.currentTime);

                let hissGain = audioCtx.createGain();
                hissGain.gain.setValueAtTime(0.014, audioCtx.currentTime);

                hissSource.connect(hissFilter);
                hissFilter.connect(hissGain);
                hissGain.connect(audioCtx.destination);
                hissSource.start();
            }
            initTapeHiss();

            const chords = [
                [55.00, 110.00, 146.83, 164.81], // Идеальные минорные волны одиночества
                [65.41, 130.81, 174.61, 196.00]
            ];

            function runNostalgiaWave() {
                const activeChord = chords[Math.floor(Math.random() * chords.length)];
                activeChord.forEach(freq => {
                    let osc = audioCtx.createOscillator();
                    let gainNode = audioCtx.createGain();
                    
                    osc.type = 'triangle';
                    
                    let tapeDrift = (Math.random() * 2 - 1) * 0.38;
                    osc.frequency.setValueAtTime(freq + tapeDrift, audioCtx.currentTime);
                    
                    gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
                    gainNode.gain.linearRampToValueAtTime(0.24, audioCtx.currentTime + 2.5); // Нарастание
                    gainNode.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 5.8); // Затухание
                    
                    osc.connect(gainNode);
                    gainNode.connect(masterFilter);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 5.9);
                });
            }

            runNostalgiaWave();
            setInterval(runNostalgiaWave, 5500);
            isMusicRunning = true;
        }

        document.body.addEventListener('click', startOneheartAmbient, { once: true });
        document.body.addEventListener('touchstart', startOneheartAmbient, { once: true });

        function switchScreen(type) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            if (type === 'write') {
                document.getElementById('screen-write').classList.add('active');
                document.getElementById('tab-write').classList.add('active');
            } else {
                document.getElementById('screen-list').classList.add('active');
                document.getElementById('tab-list').classList.add('active');
                renderNotesList();
            }
        }

        function setPrivacy(isPublic) {
            isPublicNote = isPublic;
            document.getElementById('p-btn-private').classList.toggle('active', !isPublic);
            document.getElementById('p-btn-public').classList.toggle('active', isPublic);
        }

        function setFeedChannel(channel) {
            currentFeedChannel = channel;
            document.getElementById('sub-tab-my').classList.toggle('active', channel === 'my');
            document.getElementById('sub-tab-feed').classList.toggle('active', channel === 'feed');
            renderNotesList();
        }

        // ПУБЛИКАЦИЯ ЗАПИСИ (ИСПРАВЛЕНО ДУБЛИРОВАНИЕ)
        function publishNote() {
            const hField = document.getElementById('note-heading');
            const bField = document.getElementById('note-text');
            
            if (bField.value.trim() === "") return;
            
            let heading = hField.value.trim();
            if (!heading) heading = `Мысль #${database.length + 1}`;
            
            const timeStamp = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) + ' · ' + new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});

            const newNote = {
                id: Date.now(),
                title: heading,
                body: bField.value.trim(),
                author: currentUser || "аноним",
                privacy: isPublicNote ? "public" : "private",
                time: timeStamp
            };

            let currentDb = JSON.parse(localStorage.getItem('notes_club_db_v3')) || [];
            currentDb.unshift(newNote);
            database = currentDb;
            localStorage.setItem('notes_club_db_v3', JSON.stringify(database));
            
            hField.value = "";
            bField.value = "";
            
            setFeedChannel('my'); // Перенаправляем на Мои Заметки
            switchScreen('list');
        }

        // ОТРИСОВКА КАРТОЧЕК С ВЫВОДОМ ИМЕНИ АВТОРА
        function renderNotesList(filterQuery = "") {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";

            database.forEach((note) => {
                if (filterQuery && !note.title.toLowerCase().includes(filterQuery.toLowerCase())) return;

                // УСЛОВИЕ РАЗДЕЛЕНИЯ ЛЕНТ
                if (currentFeedChannel === 'my') {
                    // Вкладка "Мои заметки": показывает абсолютно ВСЕ твои записи (и личные, и публичные)
                    if (note.author !== currentUser) return;
                } else {
                    // Вкладка "Рекомендации": показывает ВСЕ публичные записи (включая и твои собственные публичные мысли тоже!)
                    if (note.privacy !== 'public') return;
                }

                const card = document.createElement('div');
                card.classList.add('note-item');
                
                // Исправлен баг клика по тексту: передаем безопасный вызов модалки
                card.addEventListener('click', (e) => {
                    if (e.target.classList.contains('action-del')) return;
                    openNoteViewer(note);
                });
                
                const deleteBtn = note.author === currentUser ? `<button class="action-del" onclick="deleteNote(${note.id}, event)">✕</button>` : '';

                card.innerHTML = `
                    <div class="note-title">
                        <span>${note.title}</span>
                        ${deleteBtn}
                    </div>
                    <div class="note-desc">${note.body}</div>
                    <div class="note-meta">
                        <span class="note-author">@${note.author} ${note.privacy === 'private' ? '🔒' : '🌍'}</span>
                        <span>${note.time}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function liveSearch() {
            renderNotesList(document.getElementById('search-input').value);
        }

        function deleteNote(id, event) {
            event.stopPropagation();
            let currentDb = JSON.parse(localStorage.getItem('notes_club_db_v3')) || [];
            currentDb = currentDb.filter(note => note.id !== id);
            database = currentDb;
            localStorage.setItem('notes_club_db_v3', JSON.stringify(database));
            renderNotesList(document.getElementById('search-input').value);
        }

        // ОТКРЫТИЕ ПОЛНОГО ТЕКСТА КАРТОЧКИ
        function openNoteViewer(note) {
            document.getElementById('v-author').innerText = `автор: @${note.author}`;
            document.getElementById('v-title').innerText = note.title;
            document.getElementById('v-body').innerText = note.body;
            document.getElementById('viewer-modal').style.display = 'flex';
        }

        function closeNoteViewer() {
            document.getElementById('viewer-modal').style.display = 'none';
        }

        renderNotesList();
    </script>

</body>
</html>
