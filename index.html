    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
        
        /* УГОЛЬНО-ЧЕРНЫЙ ОБСИДИАНОВЫЙ ФОН */
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #020202, #070708, #0c0c0e, #040405);
            background-size: 400% 400%;
            animation: obsidianGradient 40s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes obsidianGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* СТЕКЛЯННЫЙ КОНТЕЙНЕР APPLE */
        .glass-container {
            width: 100%;
            max-width: 380px;
            height: 85vh;
            max-height: 720px;
            background: rgba(15, 15, 18, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 1px 0 rgba(255,255,255,0.02);
            margin: 16px;
        }

        /* ВЕРХНЯЯ ПАНЕЛЬ С НАЗВАНИЕМ И ВКЛАДКАМИ */
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; opacity: 0.95; }
        
        /* КНОПКИ ПЕРЕКЛЮЧЕНИЯ ОКОН */
        .tabs { display: flex; background: rgba(255,255,255,0.03); padding: 3px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.02); }
        .tab-btn {
            padding: 8px 14px;
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 9px;
            transition: all 0.2s ease;
        }
        .tab-btn.active { background: rgba(255,255,255,0.08); color: #ffffff; }

        /* ИНПУТЫ ДЛЯ ТЕКСТА */
        .glass-input {
            width: 100%;
            padding: 15px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            margin-bottom: 12px;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.2); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.04); border-color: rgba(255,255,255,0.12); }

        .textarea-input { flex: 1; min-height: 200px; resize: none; margin-bottom: 20px; }

        /* СТИЛЬНАЯ БЕЛАЯ КНОПКА ПУБЛИКАЦИИ */
        .main-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.2px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .main-btn:active { transform: scale(0.97); opacity: 0.9; }

        /* ЭКРАНЫ ОКОН */
        .screen { display: none; flex-direction: column; flex: 1; }
        .screen.active { display: flex; }

        /* СТРОКА ПОИСКА В СТИЛЕ ТЕЛЕГРАМА */
        .search-container { position: relative; margin-bottom: 16px; }
        .search-input { margin-bottom: 0; padding-left: 16px; background: rgba(255,255,255,0.03); }

        /* ЛЕНТА ЗАМЕТОК */
        .notes-list { flex: 1; overflow-y: auto; padding-right: 2px; scroll-behavior: smooth; }
        .notes-list::-webkit-scrollbar { width: 0px; }

        /* ЭСТЕТИЧНАЯ КАРТОЧКА МЫСЛИ */
        .note-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 16px;
            color: #ffffff;
            margin-bottom: 12px;
            position: relative;
            animation: appleSpawn 0.35s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.2s ease;
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.02); border-color: rgba(255,255,255,0.06); }

        @keyframes appleSpawn { 
            from { opacity: 0; transform: translateY(10px); filter: blur(3px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        .note-title { font-weight: 600; font-size: 16px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; letter-spacing: -0.2px; }
        .note-desc { font-size: 13.5px; color: rgba(255, 255, 255, 0.5); word-break: break-word; line-height: 1.45; font-weight: 400; }
        .note-meta { font-size: 10px; color: rgba(255,255,255,0.18); margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }

        .action-del { cursor: pointer; color: rgba(255,255,255,0.2); font-size: 11px; background: none; border: none; outline: none; transition: color 0.2s; }
        .action-del:hover { color: #ff453a; }
        
        /* ИНДИКАТОР МУЗЫКИ */
        .music-status { font-size: 9px; color: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-top: 4px; }
    </style>
</head>
<body>

    <div class="glass-container">
        <!-- Шапка: Название и Переключатель Вкладок -->
        <div class="top-bar">
            <div>
                <div class="logo">Notes club</div>
                <div class="music-status" id="m-status">Ambient: Off</div>
            </div>
            <div class="tabs">
                <button class="tab-btn active" id="tab-write" onclick="switchScreen('write')">Писать</button>
                <button class="tab-btn" id="tab-list" onclick="switchScreen('list')">Лента</button>
            </div>
        </div>

        <!-- ОКНО 1: НАПИСАТЬ ТЕКСТ -->
        <div id="screen-write" class="screen active">
            <input type="text" id="note-heading" class="glass-input" placeholder="Название мысли...">
            <textarea id="note-text" class="glass-input textarea-input" placeholder="Начните писать здесь..."></textarea>
            <button class="main-btn" onclick="publishNote()">Опубликовать изящно</button>
        </div>

        <!-- ОКНО 2: ЛЕНТА МЫСЛЕЙ И ЖИВОЙ ПОИСК -->
        <div id="screen-list" class="screen">
            <div class="search-container">
                <input type="text" id="search-input" class="glass-input search-input" placeholder="Поиск по названию..." oninput="liveSearch()">
            </div>
            <div id="notes-container" class="notes-list"></div>
        </div>
    </div>

    <!-- УЛЬТРАБЫСТРЫЙ ДВИЖОК JS И ГРОМКИЙ ГЕНЕРАТИВНЫЙ СИНТЕЗАТОР -->
    <script>
        let audioCtx = null;
        let oscillators = [];
        let isMusicRunning = false;
        let database = JSON.parse(localStorage.getItem('notes_club_db')) || [];

        // 1. Автоматический запуск генеративного громкого эмбиента при первом тапе по экрану
        function initAmbientAudio() {
            if (isMusicRunning) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            let filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(450, audioCtx.currentTime); // Мягкий бархатный срез
            
            let delay = audioCtx.createDelay(2.0);
            delay.delayTime.setValueAtTime(0.7, audioCtx.currentTime);
            
            let delayGain = audioCtx.createGain();
            delayGain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            
            filter.connect(audioCtx.destination);
            filter.connect(delay);
            delay.connect(delayGain);
            delayGain.connect(filter);

            const chords = [
                [65.41, 130.81, 196.00, 246.94], // Минорные обволакивающие аккорды
                [55.00, 110.00, 164.81, 220.00]
            ];

            function playNextWave() {
                const currentChord = chords[Math.floor(Math.random() * chords.length)];
                currentChord.forEach(freq => {
                    let osc = audioCtx.createOscillator();
                    let gain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    
                    // УВЕЛИЧЕННАЯ ГРОМКОСТЬ СИГНАЛА ДО 0.15 (Вместо 0.04)
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 1.5);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4.8);
                    
                    osc.connect(gain);
                    gain.connect(filter);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 4.9);
                });
            }

            playNextWave();
            setInterval(playNextWave, 4500);
            
            isMusicRunning = true;
            document.getElementById('m-status').innerText = "Ambient: Active";
            document.getElementById('m-status').style.color = "rgba(255,255,255,0.5)";
        }

        document.body.addEventListener('click', initAmbientAudio, { once: true });
        document.body.addEventListener('touchstart', initAmbientAudio, { once: true });

        // 2. Логика переключения окон (Писать / Лента)
        function switchScreen(screenType) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(t => t.classList.remove('active'));
            
            if (screenType === 'write') {
                document.getElementById('screen-write').classList.add('active');
                document.getElementById('tab-write').classList.add('active');
            } else {
                document.getElementById('screen-list').classList.add('active');
                document.getElementById('tab-list').classList.add('active');
                renderNotesList(); // Перерисовать ленту при открытии
            }
        }

        // 3. Мгновенная публикация записи
        function publishNote() {
            const hField = document.getElementById('note-heading');
            const bField = document.getElementById('note-text');
            
            if (!bField.value.strip && bField.value.trim() === "") return; // Защита от пустоты
            
            let heading = hField.value.trim();
            if (!heading) heading = `Мысль #${database.length + 1}`;
            
            const timeStamp = new Date().toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'}) + ' · ' + new Date().toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});

            const newNote = {
                title: heading,
                body: bField.value.trim(),
                time: timeStamp
            };

            database.unshift(newNote); // Всегда наверх списка
            localStorage.setItem('notes_club_db', JSON.stringify(database));
            
            // Сброс полей
            hField.value = "";
            bField.value = "";
            
            // Перекидываем пользователя сразу в окно Ленты, чтобы он увидел результат
            switchScreen('list');
        }

        // 4. Отрисовка элементов ленты заметок
        function renderNotesList(filterQuery = "") {
            const container = document.getElementById('notes-container');
            container.innerHTML = "";

            database.forEach((note, index) => {
                // 5. ИДЕАЛЬНЫЙ ТЕЛЕГРАМ-ПОИСК ПО НАЗВАНИЮ (ЗАГОЛОВКУ)
                if (filterQuery && !note.title.toLowerCase().includes(filterQuery.toLowerCase())) {
                    return; 
                }

                const card = document.createElement('div');
                card.classList.add('note-item');
                card.innerHTML = `
                    <div class="note-title">
                        <span>${note.title}</span>
                        <button class="action-del" onclick="deleteNote(${index}, event)">✕</button>
                    </div>
                    <div class="note-desc">${note.body}</div>
                    <div class="note-meta">
                        <span>${note.time}</span>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // 6. Функция Живого Поиска
        function liveSearch() {
            const query = document.getElementById('search-input').value;
            renderNotesList(query);
        }

        // 7. Точечное моментальное удаление
        function deleteNote(index, event) {
            event.stopPropagation();
            database.splice(index, 1);
            localStorage.setItem('notes_club_db', JSON.stringify(database));
            renderNotesList(document.getElementById('search-input').value);
        }

        // Запуск отображения базы при первом запуске
        renderNotesList();
    </script>

</body>
</html>
