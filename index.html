<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Obsidian Note App</title>
  
  <!-- PWA настройки и иконка -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    :root {
      --bg-color: #0b0b0b;
      --container-bg: #121212;
      --border-color: #242424;
      --text-main: #dc9264;
      --text-muted: #5e5e5e;
      --accent: #dc9264;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
    }

    .app-container {
      width: 100%;
      max-width: 500px;
      background: var(--container-bg);
      border: 1px solid var(--border-color);
      padding: 25px;
      border-radius: 4px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      border-bottom: 1px solid var(--border-color);
      padding-bottom: 15px;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-img {
      width: 24px;
      height: 24px;
      object-fit: cover;
    }

    .tabs {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: monospace;
      cursor: pointer;
      font-size: 14px;
      padding-bottom: 5px;
    }

    .tab.active {
      color: var(--text-main);
      border-bottom: 1px solid var(--accent);
    }

    textarea {
      width: 100%;
      height: 100px;
      background: #181818;
      border: 1px solid var(--border-color);
      color: #e0e0e0;
      padding: 12px;
      font-family: monospace;
      resize: none;
      outline: none;
      margin-bottom: 12px;
    }

    button.btn-main {
      width: 100%;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      padding: 12px;
      font-family: monospace;
      cursor: pointer;
      transition: all 0.2s;
    }

    button.btn-main:hover {
      background: rgba(220, 146, 100, 0.1);
    }

    .feed {
      margin-top: 25px;
      max-height: 350px;
      overflow-y: auto;
    }

    .note-card {
      background: #161616;
      border: 1px solid var(--border-color);
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 2px;
    }

    .note-date {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 8px;
    }

    .hidden {
      display: none !important;
    }

    /* Стилизация скроллбара */
    .feed::-webkit-scrollbar { width: 4px; }
    .feed::-webkit-scrollbar-thumb { background: var(--border-color); }
  </style>
</head>
<body>

  <div class="app-container">
    <div class="header">
      <div class="logo-area">
        <img src="logo.png" alt="logo" class="logo-img" onerror="this.style.display='none'">
        <span>OBSIDIAN //v1.0</span>
      </div>
      <span id="ambient-status" style="font-size: 11px; color: var(--text-muted);">music: off</span>
    </div>

    <div class="tabs">
      <button id="tabMy" class="tab active" onclick="switchTab('my')">Мои заметки</button>
      <button id="tabRec" class="tab" onclick="switchTab('rec')">Рекомендации</button>
    </div>

    <div id="inputSection">
      <textarea id="noteText" placeholder="Напиши что-нибудь меланхоличное..."></textarea>
      <button class="btn-main" onclick="addNote()">Создать себя</button>
    </div>

    <div id="myFeed" class="feed"></div>
    <div id="recFeed" class="feed hidden">
      <div class="note-card">
        <div>Всё вокруг кажется симуляцией, пока ты не запишешь это здесь. Вкладка рекомендаций работает стабильно.</div>
        <div class="note-date">системный пост // рекомендации</div>
      </div>
    </div>
  </div>

  <script>
    // --- PWA РЕГИСТРАЦИЯ РОБОТА ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('PWA успешно активирован!'))
          .catch(err => console.log('Ошибка PWA:', err));
      });
    }

    // --- УПРАВЛЕНИЕ ЗАМЕТКАМИ И ИНТЕРФЕЙСОМ ---
    let currentTab = 'my';

    window.addEventListener('DOMContentLoaded', () => {
      loadNotes();
    });

    function loadNotes() {
      const feed = document.getElementById('myFeed');
      feed.innerHTML = '';
      let notes = JSON.parse(localStorage.getItem('obsidian_notes') || '[]');
      
      if(notes.length === 0) {
        feed.innerHTML = '<div style="color: var(--text-muted); font-size: 13px; text-align: center; padding: 20px;">Тут пока пусто...</div>';
        return;
      }

      notes.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <div>${escapeHTML(note.text)}</div>
          <div class="note-date">${note.date}</div>
        `;
        feed.appendChild(card);
      });
    }

    function addNote() {
      initAudio(); // Запуск звука при первом действии пользователя
      const textarea = document.getElementById('noteText');
      const text = textarea.value.trim();
      if (!text) return;

      let notes = JSON.parse(localStorage.getItem('obsidian_notes') || '[]');
      const newNote = {
        text: text,
        date: new Date().toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' })
      };

      notes.unshift(newNote);
      localStorage.setItem('obsidian_notes', JSON.stringify(notes));
      textarea.value = '';
      loadNotes();
    }

    function switchTab(tab) {
      initAudio(); // Запуск звука при переключении вкладок
      currentTab = tab;
      
      document.getElementById('tabMy').classList.toggle('active', tab === 'my');
      document.getElementById('tabRec').classList.toggle('active', tab === 'rec');
      
      document.getElementById('myFeed').classList.toggle('hidden', tab !== 'my');
      document.getElementById('recFeed').classList.toggle('hidden', tab !== 'rec');
      
      document.getElementById('inputSection').classList.toggle('hidden', tab !== 'my');
    }

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[tag] || tag));
    }

    // --- МАТЕМАТИЧЕСКИЙ ЭМБИЕНТ (ONEHEART STYLE) ---
    let audioCtx = null;

    function initAudio() {
      if (audioCtx) return; 
      
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('ambient-status').innerText = "music: on (oneheart ambient)";
        document.getElementById('ambient-status').style.color = "var(--accent)";
        
        // Создаем левый низкий гул (Основа)
        createOscillator(110, 0.4, -0.5); 
        // Создаем правый меланхоличный аккорд
        createOscillator(165, 0.3, 0.5);  
        
      } catch(e) {
        console.log("Аудио контекст не поддерживается браузере");
      }
    }

    function createOscillator(freq, volume, pan) {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const pando = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);

      // Медленная модуляция громкости (эффект "дыхания" звука)
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 4);

      // Запускаем бесконечные волны изменения громкости
      setInterval(() => {
        let nextVol = Math.random() * volume + 0.1;
        gainNode.gain.linearRampToValueAtTime(nextVol, audioCtx.currentTime + 5);
      }, 5000);

      if (pando) {
        pando.pan.setValueAtTime(pan, audioCtx.currentTime);
        osc.connect(gainNode).connect(pando).connect(audioCtx.destination);
      } else {
        osc.connect(gainNode).connect(audioCtx.destination);
      }

      osc.start();
    }
  </script>
</body>
</html>
