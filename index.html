<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Obsidian</title>
  
  <!-- PWA настройки и иконка -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="logo.png">

  <style>
    :root {
      --bg-color: #000000;
      --text-main: #e2e2e2;
      --text-muted: #444444;
      --accent: #61afef;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 25px 20px;
    }

    .app-wrapper {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-bottom: 20px;
      font-size: 12px;
      letter-spacing: 1px;
      font-weight: 500;
    }

    .logo-area {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-main);
    }

    .logo-img {
      width: 14px;
      height: 14px;
      object-fit: cover;
      opacity: 0.7;
    }

    #ambient-status {
      color: var(--text-muted);
      transition: color 0.3s;
    }

    .tabs {
      display: flex;
      gap: 25px;
      margin-bottom: 30px;
    }

    .tab {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      cursor: pointer;
      font-size: 15px;
      font-weight: 500;
      padding: 5px 0;
      transition: color 0.2s;
    }

    .tab.active {
      color: var(--text-main);
    }

    textarea {
      width: 100%;
      height: 140px;
      background: transparent;
      border: none;
      color: #ffffff;
      font-family: inherit;
      font-size: 16px;
      line-height: 1.6;
      resize: none;
      outline: none;
      margin-bottom: 10px;
    }

    textarea::placeholder {
      color: var(--text-muted);
    }

    button.btn-main {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: inherit;
      font-size: 14px;
      cursor: pointer;
      align-self: flex-start;
      padding: 5px 0;
      transition: color 0.2s;
      margin-bottom: 40px;
    }

    button.btn-main:hover {
      color: var(--text-main);
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 30px;
    }

    .note-card {
      background: transparent;
      border: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .note-text {
      font-size: 16px;
      line-height: 1.6;
      word-break: break-word;
    }

    .note-date {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>

  <div class="app-wrapper">
    <div class="header">
      <div class="logo-area">
        <img src="logo.png" alt="" class="logo-img" onerror="this.style.display='none'">
        <span>OBSIDIAN // v1.0</span>
      </div>
      <span id="ambient-status">ambient: off</span>
    </div>

    <div class="tabs">
      <button id="tabMy" class="tab active" onclick="switchTab('my')">Заметки</button>
      <button id="tabRec" class="tab" onclick="switchTab('rec')">Рекомендации</button>
    </div>

    <div id="inputSection" style="display: flex; flex-direction: column;">
      <textarea id="noteText" placeholder="Напиши что-нибудь..."></textarea>
      <button class="btn-main" onclick="addNote()">// создать себя</button>
    </div>

    <div id="myFeed" class="feed"></div>
    <div id="recFeed" class="feed hidden">
      <div class="note-card">
        <div class="note-text">Всё вокруг кажется симуляцией, пока ты не зафиксируешь это здесь.</div>
        <div class="note-date">системный поток // рекомендации</div>
      </div>
    </div>
  </div>

  <script>
    // --- PWA РЕГИСТРАЦИЯ ---
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
      });
    }

    // --- ЛОГИКА ПРИЛОЖЕНИЯ ---
    let currentTab = 'my';

    window.addEventListener('DOMContentLoaded', () => {
      loadNotes();
    });

    function loadNotes() {
      const feed = document.getElementById('myFeed');
      feed.innerHTML = '';
      let notes = JSON.parse(localStorage.getItem('obsidian_notes') || '[]');
      
      if(notes.length === 0) {
        feed.innerHTML = '<div style="color: var(--text-muted); font-size: 14px; padding: 10px 0;">Поток пуст...</div>';
        return;
      }

      notes.forEach(note => {
        const card = document.createElement('div');
        card.className = 'note-card';
        card.innerHTML = `
          <div class="note-text">${escapeHTML(note.text)}</div>
          <div class="note-date">${note.date}</div>
        `;
        feed.appendChild(card);
      });
    }

    function addNote() {
      initAudio();
      const textarea = document.getElementById('noteText');
      const text = textarea.value.trim();
      if (!text) return;

      let notes = JSON.parse(localStorage.getItem('obsidian_notes') || '[]');
      const newNote = {
        text: text,
        date: new Date().toLocaleString('ru-RU', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' }).replace(',', '')
      };

      notes.unshift(newNote);
      localStorage.setItem('obsidian_notes', JSON.stringify(notes));
      textarea.value = '';
      loadNotes();
    }

    function switchTab(tab) {
      initAudio();
      currentTab = tab;
      
      document.getElementById('tabMy').classList.toggle('active', tab === 'my');
      document.getElementById('tabRec').classList.toggle('active', tab === 'rec');
      
      document.getElementById('myFeed').classList.toggle('hidden', tab !== 'my');
      document.getElementById('recFeed').classList.toggle('hidden', tab !== 'rec');
      
      document.getElementById('inputSection').classList.toggle('hidden', tab !== 'my');
    }

    function escapeHTML(str) {
      return str.replace(/[&<>"']/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[tag] || tag));
    }

    // --- МАТЕМАТИЧЕСКИЙ ЭМБИЕНТ ---
    let audioCtx = null;

    function initAudio() {
      if (audioCtx) return; 
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        document.getElementById('ambient-status').innerText = "ambient: on";
        document.getElementById('ambient-status').style.color = "#ffffff";
        
        createOscillator(110, 0.25, -0.6); 
        createOscillator(165, 0.20, 0.6);  
      } catch(e) {}
    }

    function createOscillator(freq, volume, pan) {
      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      const pando = audioCtx.createStereoPanner ? audioCtx.createStereoPanner() : null;

      osc.type = 'sine';
      osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(volume, audioCtx.currentTime + 3);

      setInterval(() => {
        let nextVol = Math.random() * volume + 0.05;
        gainNode.gain.linearRampToValueAtTime(nextVol, audioCtx.currentTime + 4);
      }, 4000);

      if (pando) {
        pando.pan.setValueAtTime(pan, audioCtx.currentTime);
        osc.connect(gainNode).connect(pando).connect(audioCtx.destination);
      } else {
        osc.connect(gainNode).connect(audioCtx.destination);
      }
      osc.start();
    }
  </script>
</body>
</html>
