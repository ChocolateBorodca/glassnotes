    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Helvetica Neue", sans-serif; }
        
        /* УЛЬТРА-ТЕМНЫЙ ФОН: УГОЛЬНЫЙ ОБСИДИАН С МЕДЛЕННЫМ МАТОВЫМ МЕРЦАНИЕМ */
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #020202, #070708, #0d0d0f, #050506);
            background-size: 400% 400%;
            animation: obsidianGradient 40s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        @keyframes obsidianGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* КОНТЕЙНЕР ОБСИДИАНОВОГО СТЕКЛА */
        .glass-container {
            width: 100%;
            max-width: 380px;
            height: 85vh;
            max-height: 760px;
            background: rgba(10, 10, 12, 0.4);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 24px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.95), inset 0 1px 1px rgba(255,255,255,0.02);
            margin: 16px;
            position: relative;
        }

        /* ХЕДЕР С ЭСТЕТИКОЙ APPLE */
        .header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 22px; }
        h1 { color: #ffffff; font-size: 26px; font-weight: 700; letter-spacing: -0.8px; opacity: 0.95; }
        .stats { color: rgba(255, 255, 255, 0.3); font-size: 11px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; }

        /* ИНПУТЫ И КНОПКИ */
        .glass-input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 14px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            margin-bottom: 10px;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.2); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.05); border-color: rgba(255,255,255,0.15); }

        .textarea-input { min-height: 70px; max-height: 95px; resize: none; }

        /* ИНТЕРАКТИВНЫЙ ТУЛБАР */
        .toolbar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 14px; }
        .tool-btn {
            padding: 10px 4px;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            color: rgba(255,255,255,0.4);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
        }
        .tool-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
        .tool-btn.active { background: #ffffff; color: #000000; border-color: #ffffff; }

        /* ГЛАВНАЯ ЧИСТО-БЕЛАЯ КНОПКА ДОБАВЛЕНИЯ */
        .main-btn {
            width: 100%;
            padding: 15px;
            background: #ffffff;
            border: none;
            border-radius: 14px;
            color: #000000;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: -0.3px;
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1);
            margin-bottom: 16px;
        }
        .main-btn:active { transform: scale(0.96); opacity: 0.9; }

        /* СПИСОК ЗАМЕТОК (СКРОЛЛ СКРЫТ) */
        .notes-list { flex: 1; overflow-y: auto; padding-right: 2px; scroll-behavior: smooth; }
        .notes-list::-webkit-scrollbar { width: 0px; }

        /* КАРТОЧКА ЗАМЕТКИ С ЭФФЕКТОМ APPLE SPAWN */
        .note-item {
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            padding: 16px;
            border-radius: 16px;
            color: #ffffff;
            margin-bottom: 10px;
            animation: appleSpawn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: all 0.3s ease;
        }
        .note-item:hover { background: rgba(255, 255, 255, 0.03); border-color: rgba(255,255,255,0.08); }
        
        /* Стили модификаторов */
        .note-item.important { border-left: 3px solid #ffffff; background: rgba(255,255,255,0.02); }
        .note-item.completed { opacity: 0.2; text-decoration: line-through; transform: scale(0.98); }
        .note-item.secured { filter: blur(5px); opacity: 0.2; }

        @keyframes appleSpawn { 
            from { opacity: 0; transform: translateY(14px) scale(0.97); filter: blur(4px); } 
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } 
        }

        .note-title { font-weight: 600; font-size: 15px; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
        .note-desc { font-size: 13px; color: rgba(255, 255, 255, 0.5); word-break: break-word; line-height: 1.45; }
        .note-meta { font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 10px; display: flex; justify-content: space-between; align-items: center; }

        .note-actions { display: flex; gap: 12px; }
        .action-icon { cursor: pointer; color: rgba(255,255,255,0.25); font-size: 11px; background: none; border: none; outline: none; transition: color 0.2s; }
        .action-icon:hover { color: #ffffff; }

        /* КНОПКА ГЕНЕРАТИВНОГО СИНТЕЗАТОРА */
        .music-control {
            position: absolute; top: 22px; right: 24px; 
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255, 255, 255, 0.05);
            color: rgba(255,255,255,0.5); border-radius: 50%; width: 34px; height: 34px;
            cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 12px;
            transition: all 0.3s; z-index: 10;
        }
        .music-control:hover { background: rgba(255,255,255,0.08); color: #fff; }
    </style>
</head>
<body>

    <div class="glass-container">
        <button class="music-control" id="music-btn" title="Запустить генеративный саунд-дизайн">A</button>
        
        <div class="header">
            <h1>Заметки</h1>
            <span class="stats" id="note-count">0 мыслей</span>
        </div>

        <!-- Поиск -->
        <input type="text" id="search-input" class="glass-input" placeholder="Поиск мыслей...">

        <!-- Поля ввода -->
        <input type="text" id="note-heading" class="glass-input" placeholder="Заголовок...">
        <textarea id="note-text" class="glass-input textarea-input" placeholder="Текст мысли..."></textarea>
        
        <!-- Утилиты красоты -->
        <div class="toolbar">
            <button class="tool-btn" id="btn-important">Важно</button>
            <button class="tool-btn" id="btn-caps">Caps</button>
            <button class="tool-btn" id="btn-blur">Скрыть</button>
            <button class="tool-btn" id="btn-reset">Сброс</button>
        </div>

        <button id="add-btn" class="main-btn">Добавить изящно</button>
        
        <!-- Нижние утилиты -->
        <div class="toolbar" style="grid-template-columns: repeat(3, 1fr); margin-bottom: 16px;">
            <button class="tool-btn" id="sort-toggle">Инверсия</button>
            <button class="tool-btn" id="font-toggle">Шрифт</button>
            <button class="tool-btn" id="btn-clear-all">Стереть все</button>
        </div>

        <!-- Вывод заметок -->
        <div id="notes-container" class="notes-list"></div>
    </div>

    <!-- ПРОФЕССИОНАЛЬНЫЙ ГЕНЕРАТИВНЫЙ СИНТЕЗАТОР ЭМБИЕНТА (WEB AUDIO API) -->
    <script>
        let audioCtx = null;
        let delayNode = null;
        let filterNode = null;
        let isAmbientRunning = false;
        let generatorInterval = null;

        // Эмбиент-палитра (частоты красивых минорных аккордов)
        const ambientChords = [
            [65.41, 130.81, 196.00, 246.94], // Cmaj7 Глубокий космический
            [55.00, 110.00, 164.81, 220.00], // Am Дорогой классический минор
            [73.42, 146.83, 220.00, 293.66], // Dm7 Воздушный туманный
            [48.99, 97.99, 146.83, 196.00]   // G6 Мягкий базовый пэд
        ];

        function startGenerativeMusic() {
            if (audioCtx) return;
            
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Саунд-дизайн: Создаем цепочку эффектов (Мастер-фильтр и Эхо/Delay)
            filterNode = audioCtx.createBiquadFilter();
            filterNode.type = 'lowpass';
            filterNode.frequency.setValueAtTime(400, audioCtx.currentTime); // Срезаем едкие высокие частоты
            
            delayNode = audioCtx.createDelay(2.0);
            delayNode.delayTime.setValueAtTime(0.6, audioCtx.currentTime); // Объемное эхо
            
            let delayGain = audioCtx.createGain();
            delayGain.gain.setValueAtTime(0.4, audioCtx.currentTime); // Громкость хвостов эха
            
            // Соединяем узлы: Сигнал -> Фильтр -> Эхо -> Выход
            filterNode.connect(audioCtx.destination);
            filterNode.connect(delayNode);
            delayNode.connect(delayGain);
            delayGain.connect(filterNode); // Фидбек петля для бесконечного эха

            // Генеративный цикл: Каждые 4 секунды плавно синтезируем новый случайный аккорд
            function spawnAtmosphere() {
                const randomChord = ambientChords[Math.floor(Math.random() * ambientChords.length)];
                
                randomChord.forEach(freq => {
                    let osc = audioCtx.createOscillator();
                    let oscGain = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                    
                    // Плавное нарастание (Attack) и затухание (Release) звука, чтобы убрать щелчки
                    oscGain.gain.setValueAtTime(0, audioCtx.currentTime);
                    oscGain.gain.linearRampToValueAtTime(0.04, audioCtx.currentTime + 1.5);
                    oscGain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 4.5);
                    
                    osc.connect(oscGain);
                    oscGain.connect(filterNode);
                    
                    osc.start();
                    osc.stop(audioCtx.currentTime + 4.6);
                });

                // Медленное блуждание частоты фильтра для эффекта "живого дыхания" звука
                let filterFreq = 300 + Math.sin(audioCtx.currentTime) * 150;
                filterNode.frequency.setTargetAtTime(filterFreq, audioCtx.currentTime, 1);
            }

            spawnAtmosphere();
            generatorInterval = setInterval(spawnAtmosphere, 4000);
        }

        document.getElementById('music-btn').addEventListener('click', () => {
            if (!isAmbientRunning) {
                if (!audioCtx) {
                    startGenerativeMusic();
                } else {
                    audioCtx.resume();
                }
                isAmbientRunning = true;
                document.getElementById('music-btn').innerText = "On";
                document.getElementById('music-btn').style.background = "rgba(255,255,255,0.12)";
                document.getElementById('music-btn').style.color = "#fff";
            } else {
                audioCtx.suspend();
                isAmbientRunning = false;
                document.getElementById('music-btn').innerText = "Off";
                document.getElementById('music-btn').style.background = "rgba(255,255,255,0.02)";
                document.getElementById('music-btn').style.color = "rgba(255,255,255,0.5)";
            }
        });

        // База данных сессий
        window.pullDatabase = function() { return localStorage.getItem('apple_obsidian_db') || '[]'; }
        window.pushDatabase = function(json) { localStorage.setItem('apple_obsidian_db', json); }
    </script>

    <!-- PYTHON ОБРАБОТЧИК ЛОГИКИ ПРИЛОЖЕНИЯ -->
    <script type="py">
        import json
        from pyscript import document
        from document import window
        from datetime import datetime

        state_important = False
        state_caps = False
        state_blur_mode = False
        state_mono_font = False
        database = []

        def init_app():
            global database
            try:
                database = json.loads(window.pullDatabase())
            except:
                database = []
            refresh_canvas()

        def sync_counters():
            window.pushDatabase(json.dumps(database))
            document.querySelector("#note-count").innerText = f"{len(database)} мыслей"

        def refresh_canvas(search_query=""):
            box = document.querySelector("#notes-container")
            box.innerHTML = ""
            
            for idx, item in enumerate(database):
                if search_query and search_query.lower() not in item['h'].lower() and search_query.lower() not in item['b'].lower():
                    continue

                card = document.createElement("div")
                card.classList.add("note-item")
                
                if item.get('imp'): card.classList.add("important")
                if item.get('done'): card.classList.add("completed")
                if state_blur_mode and not item.get('done'): card.classList.add("secured")
                if state_mono_font: card.style.fontFamily = "monospace"

                word_count = len(item['b'].split())
                card.innerHTML = f"""
                    <div class="note-title">
                        <span>{item['h']}</span>
                        <div class="note-actions">
                            <button class="action-icon" onclick="window.py_action_done({idx})">✓</button>
                            <button class="action-icon" onclick="window.py_action_del({idx})">✕</button>
                        </div>
                    </div>
                    <div class="note-desc">{item['b']}</div>
                    <div class="note-meta">
                        <span>{item['dt']}</span>
                        <span>{len(item['b'])} симв.</span>
                    </div>
                """
                box.appendChild(card)
            sync_counters()

        def commit_new_note(event):
            global state_important
            h_field = document.querySelector("#note-heading")
            b_field = document.querySelector("#note-text")
            
            if not b_field.value.strip():
                return
                
            heading = h_field.value.strip()
            body = b_field.value.strip()
            
            if not heading:
                heading = f"Мысль #{len(database) + 1}"
                
            if state_caps:
                heading = heading.upper()
                body = body.upper()

            new_entry = {
                "h": heading,
                "b": body,
                "imp": state_important,
                "done": False,
                "dt": datetime.now().strftime("%H:%M · %d.%m.%Y")
            }
            
            database.insert(0, new_entry)
            refresh_canvas()
            
            h_field.value = ""
            b_field.value = ""
            
            if state_important: 
                trigger_important_state(None)

        def trigger_important_state(event):
            global state_important
            state_important = not state_important
            document.querySelector("#btn-important").classList.toggle("active", state_important)

        def trigger_caps_state(event):
            global state_caps
            state_caps = not state_caps
            document.querySelector("#btn-caps").classList.toggle("active", state_caps)

        def trigger_blur_state(event):
            global state_blur_mode
            state_blur_mode = not state_blur_mode
            document.querySelector("#btn-blur").classList.toggle("active", state_blur_mode)
            refresh_canvas()

        def trigger_font_state(event):
            global state_mono_font
            state_mono_font = not state_mono_font
            document.querySelector("#font-toggle").classList.toggle("active", state_mono_font)
            refresh_canvas()

        def action_invert_sort(event):
            global database
            database.reverse()
            refresh_canvas()

        def action_reset_inputs(event):
            document.querySelector("#note-heading").value = ""
            document.querySelector("#note-text").value = ""

        def action_wipe_all(event):
            global database
            if window.confirm("Удалить всю базу мыслей?"):
                database = []
                refresh_canvas()

        def action_search_stream(event):
            query = document.querySelector("#search-input").value
            refresh_canvas(query)

        def card_toggle_done(index):
            idx = int(index)
            database[idx]['done'] = not database[idx].get('done', False)
            refresh_canvas()

        def card_delete(index):
            idx = int(index)
            database.pop(idx)
            refresh_canvas()

        window.py_action_done = card_toggle_done
        window.py_action_del = card_delete

        document.querySelector("#add-btn").onclick = commit_new_note
        document.querySelector("#btn-important").onclick = trigger_important_state
        document.querySelector("#btn-caps").onclick = trigger_caps_state
        document.querySelector("#btn-blur").onclick = trigger_blur_state
        document.querySelector("#font-toggle").onclick = trigger_font_state
        document.querySelector("#sort-toggle").onclick = action_invert_sort
        document.querySelector("#btn-reset").onclick = action_reset_inputs
        document.querySelector("#btn-clear-all").onclick = action_wipe_all
        document.querySelector("#search-input").oninput = action_search_stream

        init_app()
    </script>

</body>
