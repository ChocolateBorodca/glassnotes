<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlassNotes Apple Style</title>
    <!-- Подключаем среду Python для браузера -->
    <link rel="stylesheet" href="https://pyscript.net" />
    <script type="module" src="https://pyscript.net"></script>
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        /* Шейдерный переливающийся медленный градиент */
        body, html {
            height: 100%;
            overflow: hidden;
            background: linear-gradient(135deg, #1e3c72, #2a5298, #61045f, #aa076b);
            background-size: 400% 400%;
            animation: slowGradient 25s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes slowGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Контейнер в стиле Apple Frosted Glass */
        .glass-container {
            width: 90%;
            max-width: 400%;
            height: 85vh;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.25);
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        h1 { color: rgba(255,255,255,0.9); font-size: 28px; font-weight: 600; text-align: center; margin-bottom: 20px; }

        /* Стеклянные инпуты и кнопки */
        .glass-input {
            width: 100%;
            padding: 15px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            margin-bottom: 15px;
            transition: all 0.3s;
        }
        .glass-input::placeholder { color: rgba(255,255,255,0.4); }
        .glass-input:focus { background: rgba(255, 255, 255, 0.15); border-color: rgba(255,255,255,0.4); }

        .glass-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 15px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 20px;
        }
        .glass-btn:active { transform: scale(0.98); background: rgba(255, 255, 255, 0.15); }

        /* Скролл-список заметок */
        .notes-list { flex: 1; overflow-y: auto; padding-right: 5px; }
        .notes-list::-webkit-scrollbar { width: 4px; }
        .notes-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

        /* Элемент заметки с анимацией появления Apple */
        .note-item {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 14px;
            color: rgba(255,255,255,0.9);
            margin-bottom: 10px;
            font-size: 15px;
            word-break: break-word;
            animation: appleSpawn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        @keyframes appleSpawn {
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="glass-container">
        <h1>Заметки</h1>
        <input type="text" id="note-text" class="glass-input" placeholder="Новая заметка...">
        <button id="add-btn" class="glass-btn">Добавить изящно</button>
        <div id="notes-container" class="notes-list"></div>
    </div>

    <!-- ЭМБИЕНТ МУЗЫКА, СГЕНЕРИРОВАННАЯ КОДОМ (Web Audio API) -->
    <script>
        let audioCtx = null;
        function initAmbient() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            // Генерируем бесконечный глубокий аккорд До-Соль-До
            function createOscillator(freq, volume) {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                
                // Медленная модуляция громкости ("плавание" эмбиента)
                gainNode.gain.setValueAtTime(volume, audioCtx.currentTime);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                
                // Эффект затухания и нарастания
                setInterval(() => {
                    let mod = volume * (0.6 + 0.4 * Math.sin(audioCtx.currentTime * 0.5));
                    gainNode.gain.setTargetAtTime(mod, audioCtx.currentTime, 0.5);
                }, 500);
            }
            
            createOscillator(65.41, 0.2);  // C2
            createOscillator(98.00, 0.15); // G2
            createOscillator(130.81, 0.1); // C3
        }

        // Запуск звука при первом клике (требование безопасности браузеров)
        document.body.addEventListener('click', initAmbient, { once: true });
    </script>

    <!-- PYTHON ЛОГИКА ДЛЯ УПРАВЛЕНИЯ ИНТЕРФЕЙСОМ -->
    <script type="py">
        from pyscript import document
        from document import window

        def add_note_handler(event):
            input_element = document.querySelector("#note-text")
            text = input_element.value.strip()
            
            if text:
                container = document.querySelector("#notes-container")
                
                # Создаем элемент плашки для заметки
                note_div = document.createElement("div")
                note_div.classList.add("note-item")
                note_div.innerText = text
                
                # Вставляем в начало списка
                container.insertBefore(note_div, container.firstChild)
                input_element.value = ""

        # Привязываем клик к Python-функции
        document.querySelector("#add-btn").onclick = add_note_handler
    </script>

</body>
</html>
