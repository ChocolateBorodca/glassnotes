name: Build Android APK

on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential ccache git libffi-dev libssl-dev cmake systemd libtool autoconf pkg-config zlib1g-dev
        pip install --upgrade pip
        pip install buildozer cython setuptools sh virtualenv

    - name: Build APK with Buildozer
      run: |
        buildozer android debug
      env:
        APP_ANDROID_ACCEPT_SDK_LICENSE: "1"

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: GlassNotes-APK
        path: bin/*.apk
